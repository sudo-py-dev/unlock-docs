name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Android Signing Setup (Only on Linux runner)
      - name: Decode Keystore
        if: matrix.os == 'ubuntu-latest' && env.HAS_KEYSTORE == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo $KEYSTORE_BASE64 | base64 --decode > release.jks

      - name: Build All Targets
        shell: bash
        env:
          KEYSTORE_FILE: release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            # Build Android APK and Linux DEB
            ./gradlew :app:assembleRelease :app:packageReleaseDistributionForCurrentOS
          else
            # Build Windows MSI
            ./gradlew :app:packageReleaseDistributionForCurrentOS
          fi

      - name: Debug File Structure
        shell: bash
        run: |
          echo "Targeted search for APKs:"
          find app/build/outputs/apk -name "*.apk" || echo "No APKs found"
          echo "Targeted search for Desktop binaries:"
          find app/build/compose/binaries -name "*.msi" -o -name "*.deb" || echo "No distributables found"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.os }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/compose/binaries/**/*.msi
            app/build/compose/binaries/**/*.deb
          if-no-files-found: warn

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Assets
        run: |
          mkdir -p release-assets
          # Collect only APK, MSI, and DEB
          find artifacts -type f \( -name "*.apk" -o -name "*.msi" -o -name "*.deb" \) -print -exec cp {} release-assets/ \;
          
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
